camera:
  device_index: 0
  width: 640
  height: 360
  fps: 30

mediapipe:
  max_num_hands: 2
  min_detection_confidence: 0.8
  min_tracking_confidence: 0.6
  model_complexity: 1

nim:
  api_url: "https://integrate.api.nvidia.com/v1/chat/completions"
  model_id: "meta/llama-3.2-11b-vision-instruct"
  api_key: ""  # Set your NVIDIA API key here, or use NIM_API_KEY env var
  max_tokens: 256
  temperature: 0.2
  top_p: 0.7
  min_request_interval_sec: 1.0
  frame_resize_width: 640
  frame_resize_height: 480

pipeline:
  landmark_change_threshold: 0.03
  gesture_confidence_threshold: 0.6
  debounce_frames: 5
  cursor_smoothing: 0.7
  click_window_ms: 300
  right_click_window_ms: 300
  pinky_dip_threshold_deg: 15.0
  pinky_bend_min_frames: 3
  missed_frames_to_hide: 3
  scroll_drag_threshold: 0.06
  pinky_scroll_scale: 2.0

display:
  show_landmarks: true
  show_connections: true
  show_bounding_box: true
  show_gesture_label: true
  show_fps: true
  show_handedness: true
  landmark_color: [0, 255, 0]
  connection_color: [255, 255, 255]
  bounding_box_color: [0, 255, 0]
